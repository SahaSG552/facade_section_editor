<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test EditorToolbar Mount</title>
    <style>
        body { 
            font-family: monospace; 
            padding: 20px; 
            background: #f5f5f5;
        }
        #test-container {
            width: 800px;
            height: 600px;
            background: white;
            border: 2px solid #333;
            position: relative;
            margin: 20px 0;
        }
        #canvas {
            width: 100%;
            height: 100%;
        }
        .log {
            background: #fff;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 2px 0;
            font-size: 12px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>EditorToolbar Mount Test</h1>
    
    <button id="mount-btn">Mount Toolbar</button>
    <button id="inspect-btn">Inspect DOM</button>
    <button id="clear-log-btn">Clear Log</button>
    
    <div id="test-container">
        <svg id="canvas"></svg>
    </div>
    
    <div class="log" id="log"></div>
    <div class="log" id="dom-structure"></div>
    
    <script type="module">
        const logEl = document.getElementById('log');
        const domEl = document.getElementById('dom-structure');
        
        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function inspectDOM() {
            const container = document.getElementById('test-container');
            domEl.innerHTML = '<h3>DOM Structure:</h3>';
            
            function printElement(el, indent = 0) {
                const spaces = '  '.repeat(indent);
                const tag = el.tagName.toLowerCase();
                const id = el.id ? ` id="${el.id}"` : '';
                const classes = el.className ? ` class="${el.className}"` : '';
                const childCount = el.children.length;
                
                const line = document.createElement('div');
                line.style.fontFamily = 'monospace';
                line.style.fontSize = '11px';
                line.textContent = `${spaces}<${tag}${id}${classes}> (${childCount} children)`;
                domEl.appendChild(line);
                
                for (const child of el.children) {
                    printElement(child, indent + 1);
                }
            }
            
            printElement(container);
        }
        
        document.getElementById('mount-btn').addEventListener('click', async () => {
            addLog('Importing EditorToolbar...');
            
            try {
                const { default: EditorToolbar } = await import('./src/editor/EditorToolbar.js');
                addLog('EditorToolbar imported successfully');
                
                const container = document.getElementById('test-container');
                addLog(`Container: ${container.id}, children: ${container.children.length}`);
                
                const toolbar = new EditorToolbar(container, {
                    onToolChange: (toolId) => addLog(`Tool changed: ${toolId}`),
                    onDone: () => addLog('Done clicked'),
                    onCancel: () => addLog('Cancel clicked')
                });
                
                addLog('EditorToolbar instance created');
                
                toolbar.mount();
                
                addLog('EditorToolbar mounted');
                addLog(`Container children after mount: ${container.children.length}`);
                
                inspectDOM();
            } catch (error) {
                addLog(`ERROR: ${error.message}`);
                console.error(error);
            }
        });
        
        document.getElementById('inspect-btn').addEventListener('click', inspectDOM);
        document.getElementById('clear-log-btn').addEventListener('click', () => {
            logEl.innerHTML = '';
            domEl.innerHTML = '';
        });
        
        addLog('Test page loaded. Click "Mount Toolbar" to test.');
    </script>
</body>
</html>
